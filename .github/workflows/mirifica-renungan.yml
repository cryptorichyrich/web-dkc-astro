name: Scrape Renungan Harian Mirifica

on:
  schedule:
    # Run at 17:30 UTC = 00:30 GMT+7
    - cron: '30 17 * * *'
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape & Commit Renungan
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-save axios cheerio turndown date-fns

      - name: Run scrape script
        run: node scripts/scrape-renungan-mirifica.cjs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install pyyaml

      - name: Generate renungan index
        run: python scripts/generate-renungan-index.py

      - name: Commit & Push if anything new
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          
          # Check for new renungan articles or changed index
          git add src/content/blog/ public/assets/data/renungan-index.json
          
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan, skip commit."
          else
            git commit -m "content: update renungan harian & index $(date +'%Y-%m-%d')"
            git push
          fi
